<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Nord Invest Madagascar</title>
  <link rel="stylesheet" href="css/admin.css">
</head>
<body class="login-page">
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <img src="/images/logo.jpeg" alt="NIM" class="login-logo">
        <h1>Administration</h1>
        <p>Nord Invest Madagascar</p>
      </div>
      <form id="loginForm" autocomplete="off">
        <div class="form-group">
          <label for="username">Identifiant</label>
          <input type="text" id="username" name="username" required autofocus>
        </div>
        <div class="form-group">
          <label for="password">Mot de passe</label>
          <input type="password" id="password" name="password" required>
        </div>
        <div id="loginError" class="error-msg hidden"></div>
        <button type="submit" class="btn-primary" id="loginBtn">
          <span class="btn-text">Connexion</span>
          <span class="btn-loader hidden"></span>
        </button>
      </form>
      <button class="dark-toggle" id="loginDarkToggle" onclick="toggleLoginDark()" style="margin-top:1rem;font-size:0.75rem;padding:0.35rem 0.75rem;background:none;border:1px solid var(--gray-300);border-radius:0.375rem;cursor:pointer;color:var(--text-primary);width:100%">🌙 Mode sombre</button>
    </div>
  </div>
  <script>
    // Dark mode for login page
    const savedDark = localStorage.getItem('adminDarkMode');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    if (savedDark === 'true' || (savedDark === null && prefersDark)) {
      document.body.classList.add('dark');
    }

    function toggleLoginDark() {
      document.body.classList.toggle('dark');
      const isDark = document.body.classList.contains('dark');
      localStorage.setItem('adminDarkMode', isDark);
      document.getElementById('loginDarkToggle').textContent = isDark ? '☀️ Mode clair' : '🌙 Mode sombre';
    }

    const API_BASE = '/api/admin';
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const errorEl = document.getElementById('loginError');
      btn.querySelector('.btn-text').textContent = 'Connexion...';
      btn.querySelector('.btn-loader').classList.remove('hidden');
      btn.disabled = true;
      errorEl.classList.add('hidden');
      try {
        const res = await fetch(`${API_BASE}/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value,
            password: document.getElementById('password').value
          })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Identifiants invalides');
        localStorage.setItem('adminToken', data.token);
        window.location.href = '/admin/dashboard.html';
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.classList.remove('hidden');
        btn.querySelector('.btn-text').textContent = 'Connexion';
        btn.querySelector('.btn-loader').classList.add('hidden');
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
