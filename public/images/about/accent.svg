<svg xmlns="http://www.w3.org/2000/svg" width="400" height="500" viewBox="0 0 400 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="100%" style="stop-color:#0d0d0d"/>
    </linearGradient>
  </defs>
  <rect width="400" height="500" fill="url(#bg)"/>
  <g transform="translate(200,240)">
    <!-- Modern building detail -->
    <rect x="-80" y="-120" width="160" height="300" rx="2" fill="#2a2a2a"/>
    <rect x="-70" y="-110" width="60" height="80" rx="1" fill="#1a1a1a"/>
    <rect x="10" y="-110" width="60" height="80" rx="1" fill="#1a1a1a"/>
    <rect x="-70" y="-20" width="60" height="80" rx="1" fill="#1a1a1a"/>
    <rect x="10" y="-20" width="60" height="80" rx="1" fill="#1a1a1a"/>
    <rect x="-70" y="70" width="60" height="80" rx="1" fill="#1a1a1a"/>
    <rect x="10" y="70" width="60" height="80" rx="1" fill="#1a1a1a"/>
    <!-- Glass reflections -->
    <rect x="-65" y="-105" width="50" height="70" rx="1" fill="#c0402a" opacity="0.15"/>
    <rect x="15" y="-105" width="50" height="70" rx="1" fill="#c0402a" opacity="0.15"/>
    <rect x="-65" y="-15" width="50" height="70" rx="1" fill="#c0402a" opacity="0.15"/>
    <rect x="15" y="-15" width="50" height="70" rx="1" fill="#c0402a" opacity="0.15"/>
    <rect x="-65" y="75" width="50" height="70" rx="1" fill="#c0402a" opacity="0.15"/>
    <rect x="15" y="75" width="50" height="70" rx="1" fill="#c0402a" opacity="0.15"/>
    <!-- Door -->
    <rect x="-20" y="140" width="40" height="50" rx="0" fill="#c0402a" opacity="0.25"/>
    <rect x="-10" y="155" width="20" height="35" rx="0" fill="#c0402a" opacity="0.15"/>
    <!-- Ground -->
    <rect x="-200" y="190" width="400" height="100" fill="#1a1a1a"/>
  </g>
</svg>