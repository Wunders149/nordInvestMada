    <line x1="-110" y1="75" x2="-30" y2="75" stroke="#c0402a" stroke-width="1.5" opacity="0.4"/>
    <line x1="-110" y1="85" x2="-30" y2="85" stroke="#c0402a" stroke-width="1" opacity="0.3"/>
    <line x1="-110" y1="95" x2="-30" y2="95" stroke="#c0402a" stroke-width="1.5" opacity="0.4"/>
    <line x1="-110" y1="105" x2="-60" y2="105" stroke="#c0402a" stroke-width="1" opacity="0.3"/>
    
    <rect x="20" y="60" width="100" height="70" rx="2" fill="#c0402a" opacity="0.15"/>
