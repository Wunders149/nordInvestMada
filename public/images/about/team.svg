  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <g transform="translate(400,280)">
    <!-- Helmet silhouettes -->
    <circle cx="-100" cy="-80" r="45" fill="#333" opacity="0.9"/>
