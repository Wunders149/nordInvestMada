<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="600" viewBox="0 0 1000 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="100%" style="stop-color:#0d0d0d"/>
    </linearGradient>
    <linearGradient id="g1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c0402a"/>
      <stop offset="100%" style="stop-color:#8b2d1a"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8614a"/>
      <stop offset="100%" style="stop-color:#c0402a"/>
    </linearGradient>
  </defs>
  <rect width="1000" height="600" fill="url(#bg)"/>
  <g transform="translate(500,280)">
    <!-- Building silhouette -->
    <rect x="-180" y="40" width="80" height="200" rx="2" fill="#2a2a2a"/>
    <rect x="-85" y="-60" width="70" height="300" rx="2" fill="#333"/>
    <rect x="0" y="-120" width="90" height="360" rx="2" fill="#2a2a2a"/>
    <rect x="105" y="-20" width="75" height="260" rx="2" fill="#333"/>
    <!-- Windows building 1 -->
    <rect x="-170" y="50" width="60" height="40" rx="1" fill="#c0402a" opacity="0.3"/>
    <rect x="-170" y="100" width="60" height="40" rx="1" fill="#e8614a" opacity="0.2"/>
    <rect x="-170" y="150" width="60" height="40" rx="1" fill="#c0402a" opacity="0.3"/>
    <rect x="-170" y="200" width="60" height="30" rx="1" fill="#e8614a" opacity="0.2"/>
    <!-- Windows building 2 -->
    <rect x="-75" y="-50" width="50" height="35" rx="1" fill="#e8614a" opacity="0.25"/>
    <rect x="-75" y="-5" width="50" height="35" rx="1" fill="#c0402a" opacity="0.3"/>
    <rect x="-75" y="40" width="50" height="35" rx="1" fill="#e8614a" opacity="0.2"/>
    <rect x="-75" y="85" width="50" height="35" rx="1" fill="#c0402a" opacity="0.3"/>
    <rect x="-75" y="130" width="50" height="35" rx="1" fill="#e8614a" opacity="0.25"/>
    <rect x="-75" y="175" width="50" height="55" rx="1" fill="#c0402a" opacity="0.2"/>
    <!-- Windows building 3 -->
    <rect x="10" y="-110" width="70" height="45" rx="1" fill="#c0402a" opacity="0.3"/>
    <rect x="10" y="-55" width="70" height="45" rx="1" fill="#e8614a" opacity="0.2"/>
    <rect x="10" y="0" width="70" height="45" rx="1" fill="#c0402a" opacity="0.3"/>
    <rect x="10" y="55" width="70" height="45" rx="1" fill="#e8614a" opacity="0.25"/>
    <rect x="10" y="110" width="70" height="45" rx="1" fill="#c0402a" opacity="0.2"/>
    <rect x="10" y="165" width="70" height="65" rx="1" fill="#e8614a" opacity="0.15"/>
    <!-- Windows building 4 -->
    <rect x="115" y="-10" width="55" height="35" rx="1" fill="#e8614a" opacity="0.2"/>
    <rect x="115" y="35" width="55" height="35" rx="1" fill="#c0402a" opacity="0.3"/>
    <rect x="115" y="80" width="55" height="35" rx="1" fill="#e8614a" opacity="0.25"/>
    <rect x="115" y="125" width="55" height="35" rx="1" fill="#c0402a" opacity="0.2"/>
    <rect x="115" y="170" width="55" height="60" rx="1" fill="#e8614a" opacity="0.15"/>
    <!-- Crane -->
    <line x1="250" y1="-200" x2="250" y2="100" stroke="#555" stroke-width="3"/>
    <line x1="250" y1="-200" x2="360" y2="-180" stroke="#555" stroke-width="2"/>
    <polygon points="250,-200 240,-190 260,-190" fill="#c0402a"/>
    <line x1="360" y1="-180" x2="360" y2="-160" stroke="#666" stroke-width="1.5"/>
    <!-- Ground -->
    <rect x="-500" y="240" width="1000" height="360" fill="#1a1a1a"/>
    <rect x="-500" y="238" width="1000" height="4" fill="#c0402a" opacity="0.3"/>
  </g>
</svg>