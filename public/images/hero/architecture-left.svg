<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="600" viewBox="0 0 1000 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="100%" style="stop-color:#0d0d0d"/>
    </linearGradient>
    <linearGradient id="g1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c0402a"/>
      <stop offset="100%" style="stop-color:#8b2d1a"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8614a"/>
      <stop offset="100%" style="stop-color:#c0402a"/>
    </linearGradient>
  </defs>
  <rect width="1000" height="600" fill="url(#bg)"/>
  <g transform="translate(500,280)">
    <!-- Villa-style structure (low-rise) -->
    <rect x="-200" y="80" width="120" height="160" rx="2" fill="#2a2a2a"/>
    <rect x="-60" y="20" width="160" height="220" rx="2" fill="#333"/>
    <rect x="120" y="60" width="100" height="180" rx="2" fill="#2a2a2a"/>
    <rect x="240" y="100" width="80" height="140" rx="2" fill="#333"/>
    <!-- Roofs -->
    <polygon points="-220,80 -100,20 -140,80" fill="#c0402a" opacity="0.3"/>
    <polygon points="-80,20 40,-40 100,20" fill="#e8614a" opacity="0.25"/>
    <polygon points="100,60 220,0 240,60" fill="#c0402a" opacity="0.2"/>
    <polygon points="230,100 310,40 330,100" fill="#e8614a" opacity="0.15"/>
    <!-- Windows villa 1 -->
    <rect x="-190" y="90" width="40" height="30" rx="1" fill="#e8614a" opacity="0.25"/>
    <rect x="-140" y="90" width="50" height="30" rx="1" fill="#c0402a" opacity="0.3"/>
    <rect x="-190" y="130" width="100" height="35" rx="1" fill="#e8614a" opacity="0.2"/>
    <rect x="-190" y="175" width="100" height="55" rx="1" fill="#c0402a" opacity="0.15"/>
    <!-- Windows villa 2 -->
    <rect x="-50" y="30" width="140" height="40" rx="1" fill="#c0402a" opacity="0.3"/>
    <rect x="-50" y="80" width="140" height="40" rx="1" fill="#e8614a" opacity="0.25"/>
    <rect x="-50" y="130" width="65" height="40" rx="1" fill="#c0402a" opacity="0.3"/>
    <rect x="25" y="130" width="65" height="40" rx="1" fill="#e8614a" opacity="0.2"/>
    <rect x="-50" y="180" width="140" height="50" rx="1" fill="#c0402a" opacity="0.15"/>
    <!-- Windows villa 3 -->
    <rect x="130" y="70" width="80" height="35" rx="1" fill="#e8614a" opacity="0.25"/>
    <rect x="130" y="115" width="80" height="35" rx="1" fill="#c0402a" opacity="0.3"/>
    <rect x="130" y="160" width="80" height="70" rx="1" fill="#e8614a" opacity="0.15"/>
    <!-- Door -->
    <rect x="10" y="190" width="30" height="50" rx="1" fill="#c0402a" opacity="0.4"/>
    <!-- Trees -->
    <circle cx="-250" cy="180" r="40" fill="#1a3a1a" opacity="0.5"/>
    <circle cx="-270" cy="160" r="30" fill="#1a4a1a" opacity="0.4"/>
    <rect x="-252" y="220" width="6" height="20" fill="#333"/>
    <circle cx="380" cy="170" r="35" fill="#1a3a1a" opacity="0.5"/>
    <circle cx="395" cy="150" r="25" fill="#1a4a1a" opacity="0.4"/>
    <rect x="377" y="205" width="6" height="20" fill="#333"/>
    <!-- Ground -->
    <rect x="-500" y="240" width="1000" height="360" fill="#1a1a1a"/>
    <rect x="-500" y="238" width="1000" height="4" fill="#c0402a" opacity="0.3"/>
  </g>
</svg>
